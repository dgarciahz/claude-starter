version: "1.0"

mcp_servers:
  playwright:
    package: "@playwright/mcp@latest"
    description: "Automatización de navegador, scraping, testing, capturas"
  context7:
    package: "@upstash/context7-mcp@latest"
    description: "Documentación actualizada de librerías en contexto de Claude"
  notebooklm:
    package: "notebooklm-mcp (pip install notebooklm-mcp)"
    description: "Acceso a NotebookLM para research, consultas conversacionales y síntesis de documentos"

permissions:
  - "Bash(git *)"
  - "Bash(bash *)"
  - "Bash(mkdir -p ~/.claude/*)"
  - "Bash(cp starter/assets/caveman.md ~/.claude/output-styles/caveman.md)"
  - "PowerShell($env:CLAUDE_PERSONAL_DIR)"
  - "PowerShell(Test-Path *)"
  - "WebSearch"
  - "Bash(curl *)"
  - "WebFetch(domain:docs.anthropic.com)"
  - "WebFetch(domain:docs.claude.ai)"
  - "WebFetch(domain:pypi.org)"

env:
  CLAUDE_PERSONAL_DIR: ""   # INIT.md pregunta al usuario si está vacío

output_styles:
  - file: "caveman.md"
    name: "Caveman"
    description: "Respuestas directas, sin relleno, sin emojis"
